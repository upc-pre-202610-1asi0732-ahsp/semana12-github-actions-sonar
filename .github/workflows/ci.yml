name: Semana 12 - CI Quality Pipeline 

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build-test-coverage:
    name: Build, Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build, test and generate coverage
        run: mvn -B clean verify

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: 8e7363c5852d5ee3ca2c34982c4323b39506ed97
          SONAR_ORGANIZATION: upc-pre-202610-1asi0732-ahsp
          SONAR_PROJECT_KEY: upc-pre-202610-1asi0732-ahsp_semana12-github-actions-sonar
        run: |
          mvn -B sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=upc-pre-202610-1asi0732-ahsp \
            -Dsonar.projectKey=upc-pre-202610-1asi0732-ahsp_semana12-github-actions-sonar \
            -Dsonar.token=8e7363c5852d5ee3ca2c34982c4323b39506ed97 \
            -Dsonar.coverage.jacoco.xmlReportPaths=app/target/site/jacoco/jacoco.xml

      # === REVISA ESTE PASO (¡Es el que te falta en el primer Job!) ===
      - name: Upload Build Artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: app/target/demo-ci-cd-springboot-*.jar  # Asegúrate de que apunte a donde Maven genera tu archivo .jar

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: app/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: app/target/site/jacoco/

  docker-smoke-test:
    name: Docker Build and Smoke Test
    runs-on: ubuntu-latest
    needs: build-test-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ESTE PASO ES CRÍTICO: Descarga el JAR dentro de 'app/target/'
      - name: Download Build Artifact (JAR)
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: app/target/  # <-- Obliga a que se cree la ruta app/target/ antes del build   

      - name: Build Docker image
        run: docker build -t fitmanager-semana12:latest app

      - name: Run application container
        run: |
          docker run -d \
            --name fitmanager-semana12 \
            -p 8081:8080 \
            fitmanager-semana12:latest

      - name: Wait for application
        run: sleep 15

      - name: Smoke test health endpoint
        run: curl -f http://localhost:8081/actuator/health

      - name: Show container logs if failed
        if: failure()
        run: docker logs fitmanager-semana12
